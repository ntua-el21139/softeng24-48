  /api/chargesBy/{tollOpID}/{date_from}/{date_to}:
    get:
      tags:
      - Analysis
      summary: chargesBy
      operationId: getChargesByOperator
      parameters:
        - name: tollOpID
          in: path
          required: true
          description: The ID of the toll operator
          schema:
            type: string
        - name: date_from
          in: path
          required: true
          description: Start date in YYYYMMDD format
          schema:
            type: string
            pattern: '^\d{8}$'
            example: '20220101'
        - name: date_to
          in: path
          required: true
          description: End date in YYYYMMDD format
          schema:
            type: string
            pattern: '^\d{8}$'
            example: '20220131'
      responses:
        '200':
          description: 'Successful operation'
        '400':
          description: 'Invalid parameters'
        '204':
          description: 'No data found'
      deprecated: false
